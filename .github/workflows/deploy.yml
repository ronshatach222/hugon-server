name: Deploy to AWS

on:
  push:
    branches:
      - feature/client-players-ui

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /home/ec2-user/hugon-server

            git fetch origin

            git checkout feature/client-players-ui

            git pull origin feature/client-players-ui

            cd server

            npm install

            pm2 restart hugon-api
