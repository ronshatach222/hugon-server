<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <title>חוג</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="playersTabBtn">שחקנים</button>
    <button id="pacifierBtn">מוצץ</button>

    <div id="playersTab">

        <h1>שחקנים</h1>

        <button id="createPlayerBtn">
            צור שחקן
        </button>
        <div id="createPlayerModal" style="display:none">

            <h2>יצירת שחקן</h2>

            <input id="modalPlayerNameInput" type="text" placeholder="שם שחקן" />

            <button id="savePlayerBtn">
                שמור
            </button>

            <button id="closeModalBtn">
                סגור
            </button>

        </div>
        <table id="playersTable">
            <thead>
                <tr>
                    <th>שם שחקן</th>
                </tr>
            </thead>

            <tbody id="playersList">
            </tbody>
        </table>

    </div>

    <div id="pacifierTab" style="display:none">
        <h1>מוצץ</h1>
    </div>

    <script src="script.js"></script>

</body>

</html>
